repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ./.venv/bin/ruff format --check .
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: ./.venv/bin/ruff check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: ./.venv/bin/mypy tunning tests
        language: system
        pass_filenames: false
