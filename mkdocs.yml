site_name: tunning
site_description: A YAML-driven Rich/stdlib logging helper for CLI applications.
site_url: https://octanima-labs.github.io/tunning/
repo_url: https://github.com/octanima-labs/tunning

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_signature_annotations: true

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Configuration: configuration.md
  - Examples: examples.md
  - API Reference: api.md
  - Development: development.md
