levels:
  TRACE:
    code: 5
    symbol: '[@]'
    icon: '🎯'
    style: 'dim magenta'
  DEBUG:
    code: 10
    symbol: '[#]'
    icon: '🔍'
    style: 'magenta'
  INFO:
    code: 20
    symbol: '[*]'
    icon: '✉️'
    style: 'cyan'
  SUCCESS:
    code: 25
    symbol: '[+]'
    icon: '✅'
    style: 'green'
  WARNING:
    code: 30
    symbol: '[-]'
    icon: '⚠️'
    style: 'yellow'
  ERROR:
    code: 40
    symbol: '[!]'
    icon: '🔥'
    style: 'bold red'
  CRITICAL:
    code: 50
    symbol: '!!!'
    icon: '💥'
    style: 'bold white on red'
  MY-CUSTOM-LEVEL:
    code: 35
    symbol: '[?]'
    icon: '❔'
    style: 'bold italic underline strike #ff268f on #00faf6'

prompt:
  symbol: '<<<'
  icon: '✏️'
  style: 'italic bold black on magenta'

version: 1
disable_existing_loggers: false

formatters:
  detailed:
    format: '%(asctime)s [%(levelname)s] %(name)s %(funcName)s: %(message)s'

handlers:
  console:
    '()': 'tunning.TunnedHandler'
    level: TRACE
    show_time: false
    show_level: true
    show_path: false
    rich_tracebacks: true
    markup: true
    show_icon: false

  file:
    class: logging.handlers.RotatingFileHandler
    level: TRACE
    formatter: detailed
    filename: '.logs/app.log'
    maxBytes: '5 MB'
    backupCount: 3
    encoding: utf8

root:
  level: TRACE
  handlers: [console, file]
